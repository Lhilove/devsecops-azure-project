name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  sast_scan:
    name: Run SAST (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (Fail on Issues)
        run: |
          bandit -r app -ll -iii

  dependency_scan:
    name: Run Dependency Scan (SCA)
    runs-on: ubuntu-latest
    needs: sast_scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r app/requirements.txt

      - name: Run pip-audit (Fail on Vulnerabilities)
        run: |
          pip install pip-audit
          pip-audit --strict

  image_scan:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: dependency_scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t devsecops-app ./app

      - name: Scan Docker Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'devsecops-app'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'